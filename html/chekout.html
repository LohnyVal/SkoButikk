<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="shoes">
            <div id="cartTextDiv">
                <h1 id="cartText">Cart</h1>
            </div>
            <hr id="hr">
        </div>
        <div id="checkout">
            <div id="deliverTextDiv">
                <h2 id="deliverText">Delivery</h2>
            </div>
            <div id="deliverOptionsDiv">
                <div class="options" id="freeButton">
                    <p class="optionText">Free</p>
                </div>
                <div class="options" id="expressButton">
                    <p class="optionText">Express</p>
                </div>
            </div>
            <div id="dateOfDeliverDiv">
                <p>Delivery date: <span id="passInExpectedDate">Estimated at checkout</span></p>
            </div>
           <hr id="border"></hr>
           <input type="text" placeholder="Promocode" id="promocode">
           <div id="discountDiv">
            <p id="discount">20% off discount</p>
           </div>
           <hr id="border"></hr>
           <div id="subtotalDiv">
            <h2 id="subtotalText">Subtotal</h2>
           </div>
           <div id="subtotalInfo">
                <p class="subtotalInfoText">Discount</p>
                <p class="subtotalInfoText">Delivery <span id="spanDelivery"><svg  id="svgDelivery" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-120q-33 0-56.5-23.5T400-200q0-33 23.5-56.5T480-280q33 0 56.5 23.5T560-200q0 33-23.5 56.5T480-120Zm-80-240v-480h160v480H400Z"/></svg></span></p>

                <p class="subtotalInfoText">Tax <span id="spanTax"><svg id="svgTax" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-120q-33 0-56.5-23.5T400-200q0-33 23.5-56.5T480-280q33 0 56.5 23.5T560-200q0 33-23.5 56.5T480-120Zm-80-240v-480h160v480H400Z"/></svg></span></p>
           </div>
           <hr id="border"></hr>
           <div id="totalDiv">
            <h2 id="totalText">Total</h2>
           </div>
           <div id="checkoutButtonDiv">
            <button class="checkoutButton" id="checkoutButton">Checkout</button>
            <button class="checkoutButton" id="continueButton">Continue</button>
           </div>
        </div>
    </div>
</body>
</html>
